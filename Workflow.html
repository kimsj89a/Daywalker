<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 Gantt Chart 관리 도구</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Malgun Gothic', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
 
        .container {
            display: flex;
            min-height: 100vh;
        }
 
        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: #16213e;
            padding: 20px;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
 
        .sidebar h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #e94560;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
 
        .sidebar-actions {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #0f3460;
        }

        .sidebar h1::before {
            content: "📊";
        }
 
        .add-project-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
 
        .add-project-btn:hover {
            background: #ff6b6b;
        }

        .sidebar-btn {
            background: #0f3460;
            color: #aaa;
            width: 100%;
            margin-top: 10px;
        }

        .sidebar-btn:hover {
            background: #16213e;
            color: #e94560;
        }
 
        .project-list {
            flex: 1;
            overflow-y: auto;
        }
 
        .project-item {
            padding: 12px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .project-item:hover {
            background: #0f3460;
        }
 
        .project-item.active {
            background: #0f3460;
            border-left: 3px solid #e94560;
        }
 
        .project-item-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
 
        .project-item-actions {
            display: none;
            gap: 5px;
        }
 
        .project-item:hover .project-item-actions {
            display: flex;
        }
 
        .project-item-actions button {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 2px 5px;
            font-size: 0.85rem;
        }
 
        .project-item-actions button:hover {
            color: #e94560;
        }
 
        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
 
        .header {
            padding: 20px 30px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .header h2 {
            font-size: 1.5rem;
            color: #fff;
        }
 
        .header-actions {
            display: flex;
            gap: 10px;
        }
 
        .header-actions button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
 
        .header-actions button:hover {
            background: #e94560;
        }
 
        .content-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
 
        /* Gantt Chart Area — split layout */
        .gantt-split {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .gantt-area {
            overflow: auto;
            padding: 20px;
            cursor: grab;
            min-height: 100px;
            flex: 3;
        }

        .split-handle {
            height: 8px;
            background: #0f3460;
            cursor: row-resize;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
            transition: background 0.2s;
        }

        .split-handle:hover, .split-handle.dragging {
            background: #e94560;
        }

        .split-handle::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 2px;
            background: #888;
            border-radius: 1px;
        }

        .gantt-area.panning {
            cursor: grabbing;
            user-select: none;
        }
 
        .gantt-container {
            width: max-content;
            min-width: 100%;
        }
 
        .gantt-header {
            display: flex;
            border-bottom: 2px solid #0f3460;
            position: sticky;
            top: 0;
            background: #1a1a2e;
            z-index: 10;
        }
 
        .gantt-task-header {
            width: 160px;
            min-width: 160px;
            padding: 10px 10px;
            font-weight: bold;
            color: #e94560;
            border-right: 1px solid #0f3460;
            position: sticky;
            left: 0;
            background: #1a1a2e;
            z-index: 12;
        }
 
        .gantt-timeline-header {
            flex: 1;
            display: flex;
        }
 
        .gantt-day {
            width: 40px;
            min-width: 40px;
            text-align: center;
            padding: 10px 0;
            font-size: 0.75rem;
            color: #aaa;
            border-right: 1px solid #0f3460;
        }
 
        .gantt-day.weekend {
            background: rgba(233, 69, 96, 0.1);
        }
 
        .gantt-day.today {
            background: rgba(233, 69, 96, 0.3);
            color: #e94560;
            font-weight: bold;
        }
 
        .gantt-body {
            position: relative;
        }

        .gantt-dependency-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .dependency-line {
            fill: none;
            stroke: #e94560;
            stroke-width: 2;
            stroke-dasharray: 6 3;
            opacity: 0.7;
        }

        .dep-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #aaa;
            top: 50%;
            transform: translateY(-50%);
            z-index: 15;
            cursor: crosshair;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            pointer-events: auto;
        }
        .dep-dot:hover, .dep-dot.active {
            opacity: 1 !important;
            transform: translateY(-50%) scale(1.4);
            background: #e94560;
        }
        .gantt-bar:hover .dep-dot {
            opacity: 0.7;
        }
        .dep-dot-left {
            left: -5px;
        }
        .dep-dot-right {
            right: -5px;
        }
        .dep-drag-line {
            stroke: #e94560;
            stroke-width: 2;
            stroke-dasharray: 4 4;
            pointer-events: none;
        }
        .dep-dot-circle {
            pointer-events: all;
            cursor: crosshair;
        }
 
        .gantt-row {
            display: flex;
            border-bottom: 1px solid #0f3460;
            min-height: 50px;
        }
 
        .gantt-row:hover {
            background: rgba(15, 52, 96, 0.3);
        }

        .gantt-row:hover .gantt-task-cell {
            background: #1e2a45;
        }

        .gantt-row.drag-over {
            border-top: 2px solid #e94560;
        }

        .gantt-task-cell.dragging {
            opacity: 0.4;
        }
 
        .gantt-task-cell {
            width: 160px;
            min-width: 160px;
            padding: 10px 10px;
            border-right: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            left: 0;
            background: #1a1a2e;
            z-index: 6;
            cursor: grab;
        }
 
        .task-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }
 
        .task-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }
 
        .task-name:hover {
            color: #e94560;
        }
 
        .gantt-timeline-cell {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }
 
        .gantt-cell-day {
            width: 40px;
            min-width: 40px;
            border-right: 1px solid #0f3460;
        }
 
        .gantt-cell-day.weekend {
            background: rgba(233, 69, 96, 0.05);
        }
 
        .gantt-bar {
            position: absolute;
            height: 28px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 0.75rem;
            color: white;
            transition: opacity 0.2s;
            overflow: hidden;
            white-space: nowrap;
        }
 
        .gantt-bar:hover {
            opacity: 0.8;
        }
 
        .gantt-bar-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px 0 0 4px;
        }
 
        .gantt-bar-text {
            position: relative;
            z-index: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }
 
        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
            padding: 40px;
        }
 
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
 
        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #aaa;
        }
 
        .empty-state p {
            color: #666;
        }
 
        /* Memo Panel */
        .memo-panel {
            width: 320px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }
 
        .memo-panel.hidden {
            display: none;
        }
 
        .memo-header {
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .memo-header h3 {
            font-size: 1rem;
            color: #e94560;
        }
 
        .memo-close {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.2rem;
        }
 
        .memo-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
 
        .memo-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
 
        .memo-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #e94560;
        }
 
        .memo-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #aaa;
        }
 
        .memo-item-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }
 
        .memo-item-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
 
        .memo-item-actions button {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.8rem;
        }
 
        .memo-item-actions button:hover {
            color: #e94560;
        }
 
        .add-memo-btn {
            margin-top: 15px;
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
 
        .add-memo-btn:hover {
            background: #e94560;
        }
 
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
 
        .modal-overlay.hidden {
            display: none;
        }
 
        .modal {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
 
        .modal h3 {
            margin-bottom: 20px;
            color: #e94560;
        }
 
        .form-group {
            margin-bottom: 20px;
        }
 
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }
 
        .form-group input,

        
        .form-group textarea,


        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1rem;
        }
 
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }
 
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
 
        .form-row {
            display: flex;
            gap: 15px;
        }
 
        .form-row .form-group {
            flex: 1;
        }
 
        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
 
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
 
        .color-option:hover {
            transform: scale(1.1);
        }
 
        .color-option.selected {
            border-color: #fff;
        }
 
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
 
        .modal-actions button {
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            border: none;
        }
 
        .btn-cancel {
            background: #0f3460;
            color: #fff;
        }
 
        .btn-save {
            background: #e94560;
            color: #fff;
        }
 
        .btn-delete {
            background: #ff4757;
            color: #fff;
        }
 
        .modal-actions button:hover {
            opacity: 0.9;
        }
 
        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }
 
        .zoom-controls button {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
 
        .zoom-controls span {
            margin: 0 10px;
            font-size: 0.85rem;
            color: #aaa;
        }
 
        /* Progress Slider */
        .progress-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: #0f3460;
            border-radius: 4px;
            outline: none;
        }
 
        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #e94560;
            border-radius: 50%;
            cursor: pointer;
        }
 
        .progress-value {
            text-align: center;
            margin-top: 5px;
            color: #aaa;
            font-size: 0.85rem;
        }
 
        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
 
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
 
        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }
 
        ::-webkit-scrollbar-thumb:hover {
            background: #e94560;
        }
 
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
                padding: 10px;
            }
 
            .sidebar h1 {
                font-size: 0;
            }
 
            .sidebar h1::before {
                font-size: 1.5rem;
            }
 
            .add-project-btn {
                padding: 10px;
                font-size: 0;
            }
 
            .add-project-btn::before {
                content: "+";
                font-size: 1.2rem;
            }
 
            .project-item-name {
                display: none;
            }
 
            .memo-panel {
                position: fixed;
                right: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
            }
        }

        /* Dashboard Styles */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            width: 100%;
        }

        .dashboard-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #0f3460;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            height: 180px;
            position: relative;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
        }

        .dashboard-card h3 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .dashboard-card p {
            color: #aaa;
            font-size: 0.9rem;
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .dashboard-card-meta {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #666;
        }

        .dashboard-card.add-new {
            border: 2px dashed #0f3460;
            background: transparent;
            align-items: center;
            justify-content: center;
            color: #aaa;
        }

        .dashboard-card.add-new:hover {
            border-color: #e94560;
            color: #e94560;
            background: rgba(233, 69, 96, 0.05);
        }

        .add-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .dashboard-card-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 10;
        }

        .dashboard-card:hover .dashboard-card-delete {
            opacity: 1;
        }

        .dashboard-card-delete:hover {
            background: #ff4757;
        }

        .gantt-bar {
            cursor: grab;
        }
        
        .gantt-bar:active {
            cursor: grabbing;
        }

        .gantt-bar-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 10px;
            cursor: ew-resize;
            background: transparent;
            z-index: 10;
        }

        .gantt-bar-handle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Task Highlight Animation */
        @keyframes highlightPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); transform: translateY(-50%) scale(1); z-index: 100; }
            50% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); transform: translateY(-50%) scale(1.1); z-index: 100; }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); transform: translateY(-50%) scale(1); z-index: auto; }
        }
        .highlight-task {
            animation: highlightPulse 1.5s ease-out infinite;
            border: 2px solid #fff !important;
        }

        .gantt-bar.completed .gantt-bar-text {
            text-decoration: line-through;
            opacity: 0.8;
        }

        .gantt-bar.completed {
            opacity: 0.6;
            filter: grayscale(0.6);
        }

        .gantt-task-cell.completed .task-name {
            text-decoration: line-through;
            color: #777;
            font-style: italic;
        }

        /* HTML5 Drag and Drop Styles */
        .dragging {
            opacity: 0.5;
        }

        /* Context Menu */
        .context-menu {
            position: absolute;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            padding: 5px 0;
            min-width: 150px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 2000;
            display: none;
        }
        .context-menu-item {
            padding: 8px 15px;
            cursor: pointer;
            color: #eee;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .context-menu-item:hover {
            background: #0f3460;
            color: #e94560;
        }

        /* Trash Zone */
        .trash-zone {
            margin-top: 10px;
            padding: 15px;
            border: 2px dashed #0f3460;
            border-radius: 8px;
            text-align: center;
            color: #666;
            transition: all 0.2s;
            cursor: default;
        }
        .trash-zone:hover {
            border-color: #ff4757;
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
        }

        /* Sidebar Tree Group */
        .sidebar-group {
            margin-bottom: 2px;
        }

        .sidebar-group-header {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            color: #888;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
            border-radius: 6px;
            transition: all 0.15s;
            gap: 6px;
        }

        .sidebar-group-header:hover {
            color: #ccc;
            background: rgba(255, 255, 255, 0.04);
        }

        .sidebar-group-header .group-toggle {
            font-size: 0.6rem;
            width: 16px;
            text-align: center;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .sidebar-group.collapsed .group-toggle {
            transform: rotate(-90deg);
        }

        .sidebar-group-header .group-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

    <script>
        // ===== Firebase 설정 =====
        // 아래 firebaseConfig를 본인의 Firebase 프로젝트 설정으로 교체하세요.
        // Firebase Console > 프로젝트 설정 > 일반 > 내 앱 > SDK 설정에서 복사
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAE3xKYtrg2sn2AuLNE1lMN2nUcIv6kDeg",
            authDomain: "sj-dash-9b65d.firebaseapp.com",
            databaseURL: "https://sj-dash-9b65d-default-rtdb.firebaseio.com",
            projectId: "sj-dash-9b65d",
            storageBucket: "sj-dash-9b65d.firebasestorage.app",
            messagingSenderId: "751850940500",
            appId: "1:751850940500:web:b81b474a0d3acdbcb4a5c1"
        };

        // 워크스페이스 ID: 같은 ID를 쓰는 팀원끼리 데이터 공유
        const WORKSPACE_ID = 'default';

        // Firebase 초기화
        let firebaseEnabled = false;
        let _syncingFromFirebase = false;
        let _firebaseRef = null;

        if (FIREBASE_CONFIG.apiKey && typeof firebase !== 'undefined') {
            try {
                firebase.initializeApp(FIREBASE_CONFIG);
                _firebaseRef = firebase.database().ref(`workspaces/${WORKSPACE_ID}/projects`);
                firebaseEnabled = true;
            } catch (e) {
                console.warn('Firebase 초기화 실패, localStorage 모드로 동작합니다.', e);
            }
        }

        // ===== 동기화 상태 표시 =====
        function setSyncStatus(status) {
            const el = document.getElementById('syncStatus');
            if (!el) return;
            if (status === 'synced') {
                el.textContent = '● 실시간 동기화 중';
                el.style.color = '#1dd1a1';
            } else if (status === 'saving') {
                el.textContent = '● 저장 중...';
                el.style.color = '#feca57';
            } else if (status === 'offline') {
                el.textContent = '● 오프라인 (로컬 저장)';
                el.style.color = '#ff6b6b';
            }
        }

        // Color Palette
        const COLORS = [
            '#e94560', '#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1',
            '#5f27cd', '#00d2d3', '#ff9ff3', '#54a0ff', '#c8d6e5'
        ];

        // App State
        let state = {
            projects: [],
            currentProjectId: null,
            zoom: 100,
            dayWidth: 40,
            editingProjectId: null,
            editingTaskId: null,
            editingMemoId: null,
            filterCompleted: false,
            hideCompleted: false,
            highlightTaskId: null,
            contextMenuTarget: null,
            collapsedGroups: {},
            _scrollToToday: true
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            if (!firebaseEnabled) {
                renderProjects();
            }
            setDefaultDates();
            
            document.addEventListener('click', () => {
                hideContextMenu();
            });
        });
 
        // ===== 데이터 저장/로드 (Firebase + localStorage) =====
        async function loadState() {
            // 1) 개인 UI 상태는 항상 localStorage에서 로드
            const localUI = localStorage.getItem('ganttLocalUI');
            if (localUI) {
                const parsed = JSON.parse(localUI);
                state.currentProjectId = parsed.currentProjectId || null;
                state.filterCompleted = parsed.filterCompleted || false;
                state.collapsedGroups = parsed.collapsedGroups || {};
            }

            // 2) Electron 로컬 파일 저장 모드 (우선)
            if (typeof window.electronAPI !== 'undefined' && window.electronAPI.loadLocalData) {
                try {
                    const raw = await window.electronAPI.loadLocalData('projects.json');
                    if (raw) {
                        const data = JSON.parse(raw);
                        state.projects = (data || []).map(p => ({
                            ...p,
                            tasks: Array.isArray(p.tasks) ? p.tasks : (p.tasks ? Object.values(p.tasks) : []),
                            memos: Array.isArray(p.memos) ? p.memos : (p.memos ? Object.values(p.memos) : [])
                        }));
                        setSyncStatus('synced');
                        renderProjects();
                        renderGantt();

                        // Firebase에도 있으면 → 로컬 파일로 마이그레이션 완료 표시
                        console.log('로컬 파일에서 프로젝트 로드 완료:', state.projects.length, '개');
                        return;
                    }

                    // 로컬 파일이 없으면 Firebase/localStorage에서 마이그레이션
                    let migrated = false;

                    if (firebaseEnabled && _firebaseRef) {
                        const snapshot = await _firebaseRef.once('value');
                        let data = snapshot.val();
                        if (data) {
                            if (!Array.isArray(data)) data = Object.values(data);
                            state.projects = data.map(p => ({
                                ...p,
                                tasks: Array.isArray(p.tasks) ? p.tasks : (p.tasks ? Object.values(p.tasks) : []),
                                memos: Array.isArray(p.memos) ? p.memos : (p.memos ? Object.values(p.memos) : [])
                            }));
                            migrated = true;
                            console.log('Firebase → 로컬 파일 마이그레이션');
                        }
                    }

                    if (!migrated) {
                        const saved = localStorage.getItem('ganttManagerState');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            state.projects = parsed.projects || [];
                            migrated = true;
                            console.log('localStorage → 로컬 파일 마이그레이션');
                        }
                    }

                    if (migrated) {
                        await window.electronAPI.saveLocalData('projects.json', JSON.stringify(state.projects, null, 2));
                        setSyncStatus('synced');
                    } else {
                        setSyncStatus('synced');
                    }

                    renderProjects();
                    renderGantt();
                    return;
                } catch (err) {
                    console.error('로컬 파일 로드 실패:', err);
                }
            }

            // 3) 비-Electron 환경 폴백 (Firebase → localStorage)
            if (firebaseEnabled && _firebaseRef) {
                _firebaseRef.on('value', (snapshot) => {
                    _syncingFromFirebase = true;
                    let data = snapshot.val();
                    if (data && !Array.isArray(data)) {
                        data = Object.values(data);
                    }
                    state.projects = (data || []).map(p => ({
                        ...p,
                        tasks: Array.isArray(p.tasks) ? p.tasks : (p.tasks ? Object.values(p.tasks) : []),
                        memos: Array.isArray(p.memos) ? p.memos : (p.memos ? Object.values(p.memos) : [])
                    }));
                    setSyncStatus('synced');
                    renderProjects();
                    renderGantt();
                    _syncingFromFirebase = false;
                });

                firebase.database().ref('.info/connected').on('value', (snap) => {
                    setSyncStatus(snap.val() === true ? 'synced' : 'offline');
                });
            } else {
                setSyncStatus('offline');
                const saved = localStorage.getItem('ganttManagerState');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.projects = parsed.projects || [];
                }
                renderProjects();
                renderGantt();
            }
        }

        function saveState() {
            // 0) 태스크 lastModified 갱신
            const _now = new Date().toISOString();
            state.projects.forEach(p => {
                if (p.type === 'separator') return;
                (p.tasks || []).forEach(t => {
                    if (!t.lastModified) t.lastModified = _now;
                });
            });

            // 1) 개인 UI 상태 → localStorage
            localStorage.setItem('ganttLocalUI', JSON.stringify({
                currentProjectId: state.currentProjectId,
                filterCompleted: state.filterCompleted,
                collapsedGroups: state.collapsedGroups
            }));

            // 2) 프로젝트 데이터 → 로컬 파일 (Electron) 우선
            if (typeof window.electronAPI !== 'undefined' && window.electronAPI.saveLocalData) {
                setSyncStatus('saving');
                window.electronAPI.saveLocalData('projects.json', JSON.stringify(state.projects, null, 2))
                    .then(() => setSyncStatus('synced'))
                    .catch((err) => {
                        console.error('로컬 파일 저장 실패:', err);
                        setSyncStatus('offline');
                    });
            } else if (firebaseEnabled && _firebaseRef && !_syncingFromFirebase) {
                // 비-Electron 환경에서 Firebase 폴백
                setSyncStatus('saving');
                _firebaseRef.set(state.projects).then(() => {
                    setSyncStatus('synced');
                }).catch((err) => {
                    console.error('Firebase 저장 실패:', err);
                    setSyncStatus('offline');
                    localStorage.setItem('ganttManagerState', JSON.stringify({
                        projects: state.projects
                    }));
                });
            } else {
                localStorage.setItem('ganttManagerState', JSON.stringify({
                    projects: state.projects,
                    currentProjectId: state.currentProjectId,
                    filterCompleted: state.filterCompleted,
                    collapsedGroups: state.collapsedGroups
                }));
            }
        }
 
        function handleSearch(query) {
            state.searchQuery = query;
            renderProjects();
            if (state.currentProjectId) {
                renderGantt();
            }
        }

        // Project Functions
        function renderProjects() {
            const list = document.getElementById('projectList');
            const lowerQuery = (state.searchQuery || '').trim().toLowerCase();

            // flat 배열을 그룹별로 분류
            const groups = []; // { separator: item|null, projects: [] }
            let currentGroup = { separator: null, projects: [] };

            state.projects.forEach(item => {
                if (item.type === 'separator') {
                    // 이전 그룹 저장
                    groups.push(currentGroup);
                    currentGroup = { separator: item, projects: [] };
                } else {
                    currentGroup.projects.push(item);
                }
            });
            groups.push(currentGroup);

            function renderProjectItem(item) {
                const projectMatches = lowerQuery && (item.name || '').toLowerCase().includes(lowerQuery);
                const taskMatches = lowerQuery && (item.tasks || []).some(t => (t.name || '').toLowerCase().includes(lowerQuery));
                const searchClass = (projectMatches || taskMatches) ? 'search-highlight' : '';

                return `
                <div class="project-item ${item.id === state.currentProjectId ? 'active' : ''} ${searchClass}"
                     style="${item.id === state.currentProjectId ? `border-left-color: ${item.color || '#e94560'}; background: linear-gradient(90deg, ${item.color}22, transparent);` : ''}"
                     draggable="true"
                     ondragstart="handleDragStart(event, 'project', '${item.id}')"
                     ondragover="handleDragOver(event)"
                     ondrop="handleSidebarDrop(event, '${item.id}')"
                     ondragend="handleDragEndHTML5(event)"
                     oncontextmenu="handleContextMenu(event, 'project', '${item.id}')"
                     onclick="selectProject('${item.id}')"
                     ondblclick="editProject('${item.id}')">
                    <span class="project-item-name">${escapeHtml(item.name)}</span>
                    <div class="project-item-actions">
                        <button onclick="event.stopPropagation(); editProject('${item.id}')">✎</button>
                    </div>
                </div>`;
            }

            let html = '';
            groups.forEach(group => {
                if (group.separator === null) {
                    // separator 없는 최상위 프로젝트 (기본 그룹)
                    html += group.projects.map(renderProjectItem).join('');
                } else {
                    const sep = group.separator;
                    const isCollapsed = state.collapsedGroups[sep.id];
                    // 검색 시 매칭 프로젝트가 있으면 자동 펼치기
                    const hasMatch = lowerQuery && group.projects.some(p =>
                        (p.name || '').toLowerCase().includes(lowerQuery) ||
                        (p.tasks || []).some(t => (t.name || '').toLowerCase().includes(lowerQuery))
                    );
                    const collapsed = lowerQuery ? (hasMatch ? false : isCollapsed) : isCollapsed;

                    html += `
                    <div class="sidebar-group ${collapsed ? 'collapsed' : ''}"
                         ondragover="handleDragOver(event)"
                         ondrop="handleSidebarDrop(event, '${sep.id}')">
                        <div class="sidebar-group-header"
                             draggable="true"
                             ondragstart="handleDragStart(event, 'separator', '${sep.id}')"
                             ondragend="handleDragEndHTML5(event)"
                             oncontextmenu="handleContextMenu(event, 'separator', '${sep.id}')"
                             onclick="toggleGroup('${sep.id}')">
                            <span class="group-toggle">▼</span>
                            <span class="group-name">${escapeHtml(sep.name)}</span>
                            <span class="group-count">${group.projects.length}</span>
                            <div class="group-actions">
                                <button onclick="event.stopPropagation(); addProjectToGroup('${sep.id}')" title="프로젝트 추가">+</button>
                                <button onclick="event.stopPropagation(); renameGroup('${sep.id}')" title="이름 변경">✎</button>
                                <button onclick="event.stopPropagation(); deleteGroup('${sep.id}')" title="그룹 삭제">×</button>
                            </div>
                        </div>
                        <div class="sidebar-group-children">
                            ${group.projects.map(renderProjectItem).join('')}
                        </div>
                    </div>`;
                }
            });

            list.innerHTML = html;

            // Add context menu listener to the background
            list.oncontextmenu = (e) => {
                if (e.target === list) {
                    handleContextMenu(e, 'background', null);
                }
            };
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    if (!importedState.projects) throw new Error("Invalid format");
                    
                    if (confirm('현재 데이터를 덮어쓰고 가져온 데이터로 복원하시겠습니까?')) {
                        state = importedState;

                        renderProjects();

                        alert('데이터가 성공적으로 복원되었습니다.');
                    }
                } catch (err) {

                }
                input.value = ''; // Reset
            };
            reader.readAsText(file);
        }
 
        function exportToCSV() {
            const project = getCurrentProject();
            if (!project) {
                alert('프로젝트를 선택하세요.');
                return;
            }

            const headers = ['Task Name', 'Start Date', 'End Date', 'Progress', 'Memo', 'Dependencies'];
            const rows = project.tasks.map(t => [
                `"${t.name.replace(/"/g, '""')}"`,
                t.startDate,
                t.endDate,
                `${t.progress}%`,
                `"${(t.memo || '').replace(/"/g, '""')}"`,
                `"${(t.dependencies || []).join(',')}"`
            ]);

            const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${project.name}_tasks.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function saveProject() {
            const name = document.getElementById('projectName').value.trim();
            const description = document.getElementById('projectDescription').value.trim();
            const color = document.querySelector('#projectColorOptions .color-option.selected')?.dataset.color || COLORS[0];
 
            if (!name) {
                alert('프로젝트 이름을 입력하세요');
                return;
            }
 
            if (state.editingProjectId) {
                const project = state.projects.find(p => p.id === state.editingProjectId);
                project.name = name;
                project.description = description;
                project.color = color;
            } else {
                const newProject = {
                    id: generateId(),
                    name,
                    description,
                    tasks: [],
                    memos: [],
                    createdAt: new Date().toISOString(),
                    color: color
                };
                // 그룹 뒤에 삽입할지 확인
                if (state._insertAfterGroup) {
                    const groupIdx = state.projects.findIndex(p => p.id === state._insertAfterGroup);
                    if (groupIdx !== -1) {
                        // 해당 그룹의 마지막 프로젝트 뒤에 삽입
                        let insertIdx = groupIdx + 1;
                        while (insertIdx < state.projects.length && state.projects[insertIdx].type !== 'separator') {
                            insertIdx++;
                        }
                        state.projects.splice(insertIdx, 0, newProject);
                    } else {
                        state.projects.push(newProject);
                    }
                    delete state._insertAfterGroup;
                } else {
                    state.projects.push(newProject);
                }
                state.currentProjectId = newProject.id;
            }

            saveState();
            renderProjects();
            renderGantt();
            closeProjectModal();
        }

            openProjectModal(projectId);
        }
 
        function deleteProject() {
            if (!confirm('정말로 이 프로젝트를 삭제하시겠습니까?')) return;
 
            state.projects = state.projects.filter(p => p.id !== state.editingProjectId);
            if (state.currentProjectId === state.editingProjectId) {
                state.currentProjectId = state.projects.length > 0 ? state.projects[0].id : null;
            }
 
            saveState();
            renderProjects();
            renderGantt();
            closeProjectModal();
        }
 
        function deleteProjectById(id) {
            if (!confirm('정말로 이 프로젝트를 삭제하시겠습니까?')) return;
            state.projects = state.projects.filter(p => p.id !== id);
            if (state.currentProjectId === id) {
                state.currentProjectId = null;
            }
            saveState();
            renderProjects();
            renderGantt();
        }

        function enableInlineEdit(element, field) {
            const project = getCurrentProject();
            if (!project) return;

            // Prevent multiple clicks
            if (element.querySelector('input, textarea')) return;

            const currentText = project[field] || '';
            const input = document.createElement(field === 'description' ? 'textarea' : 'input');
            input.value = currentText;
            
            // Style to match parent
            input.style.width = '100%';
            input.style.background = '#1a1a2e';
            input.style.color = '#fff';
            input.style.border = '1px solid #e94560';
            input.style.borderRadius = '4px';
            input.style.padding = '5px';
            input.style.fontSize = 'inherit';
            input.style.fontFamily = 'inherit';

            if (field === 'description') {
                input.style.resize = 'vertical';
            }

            input.onblur = () => {
                const newValue = input.value.trim();
                if (newValue !== currentText) {
                    project[field] = newValue;
                    saveState();
                    renderProjects(); // Update sidebar if name changed
                }
                renderGantt(); // Restore text view
            };

            input.onkeydown = (e) => {
                if (e.key === 'Enter' && field !== 'description') {
                    input.blur();
                }
            };

            element.textContent = '';
            element.appendChild(input);
            input.focus();
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.add('hidden');
            state.editingTaskId = null;
        }
 
        function saveTask() {
            const name = document.getElementById('taskName').value.trim();
            const startDate = document.getElementById('taskStartDate').value;
            const endDate = document.getElementById('taskEndDate').value;
            const memo = document.getElementById('taskMemo').value.trim();
            const color = document.querySelector('#taskColorOptions .color-option.selected')?.dataset.color || COLORS[0];
            const isCompleted = document.getElementById('taskCompleted').checked;
            
            const dependencies = [];
            document.querySelectorAll('#taskDependencies input:checked').forEach(cb => {
                dependencies.push(cb.value);
            });
 
            if (!name) {
                alert('태스크 이름을 입력하세요');
                return;
            }
 
            if (!startDate || !endDate) {
                alert('시작일과 종료일을 입력하세요');
                return;
            }
 
            if (new Date(startDate) > new Date(endDate)) {
                alert('종료일은 시작일보다 늦어야 합니다');
                return;
            }
 
            const project = getCurrentProject();
 
            if (state.editingTaskId) {
                const task = project.tasks.find(t => t.id === state.editingTaskId);
                task.name = name;
                task.startDate = startDate;
                task.endDate = endDate;
                task.memo = memo;
                task.progress = isCompleted ? 100 : 0;
                task.color = color;
                task.dependencies = dependencies;
            } else {
                project.tasks.push({
                    id: generateId(),
                    name,
                    startDate,
                    endDate,
                    progress: isCompleted ? 100 : 0,
                    memo,
                    color,
                    dependencies,
                    createdAt: new Date().toISOString()
                });
            }
 
            saveState();
            renderGantt();
            closeTaskModal();
        }
 
        function deleteTask() {
            if (!confirm('정말로 이 태스크를 삭제하시겠습니까?')) return;
 
            const project = getCurrentProject();
            project.tasks = project.tasks.filter(t => t.id !== state.editingTaskId);
 
            saveState();
            renderGantt();
            closeTaskModal();
        }
 
        // Context Menu Functions
        function handleContextMenu(e, type, id) {
            e.preventDefault();
            e.stopPropagation();
            state.contextMenuTarget = { type, id };
            
            const menu = document.getElementById('contextMenu');
            const dupBtn = document.getElementById('ctxMenuDuplicate');
            const completeBtn = document.getElementById('ctxMenuComplete');
            const newProjBtn = document.getElementById('ctxMenuNewProject');
            const newSepBtn = document.getElementById('ctxMenuNewSeparator');
            const renameSepBtn = document.getElementById('ctxMenuRenameSeparator');
            const deleteSepBtn = document.getElementById('ctxMenuDeleteSeparator');
            const editBtn = menu.querySelector('div[onclick="handleMenuAction(\'edit\')"]');
            const deleteBtn = menu.querySelector('div[onclick="handleMenuAction(\'delete\')"]');
            
            // Reset all
            [dupBtn, completeBtn, newProjBtn, newSepBtn, renameSepBtn, deleteSepBtn, editBtn, deleteBtn].forEach(el => el.style.display = 'none');

            if (type === 'task') {
                // 완료 상태에 따라 라벨 변경
                const project = getCurrentProject();
                const task = project && project.tasks ? project.tasks.find(t => t.id === id) : null;
                if (task && task.progress === 100) {
                    completeBtn.innerHTML = '🔄 재개';
                } else {
                    completeBtn.innerHTML = '✅ 완료';
                }
                [completeBtn, editBtn, dupBtn, deleteBtn].forEach(el => el.style.display = 'flex');
            } else if (type === 'project') {
                [editBtn, deleteBtn].forEach(el => el.style.display = 'flex');
            } else if (type === 'background') {
                [newProjBtn, newSepBtn].forEach(el => el.style.display = 'flex');
            } else if (type === 'separator') {
                [newProjBtn, renameSepBtn, deleteSepBtn].forEach(el => el.style.display = 'flex');
            }

            menu.style.display = 'block';
            menu.style.left = `${e.pageX}px`;
            menu.style.top = `${e.pageY}px`;
        }

        function hideContextMenu() {
            document.getElementById('contextMenu').style.display = 'none';
        }

        function handleMenuAction(action) {
            const target = state.contextMenuTarget;
            if (!target) return;

            if (action === 'newProject') {
                openProjectModal();
            }
            if (action === 'newSeparator') {
                const name = prompt('새 구분선 이름을 입력하세요:');
                if (name) {
                    state.projects.push({ id: generateId(), type: 'separator', name });
                    saveState();
                    renderProjects();
                }
            }
            if (target.type === 'separator') {
                if (action === 'renameSeparator') {
                    const sep = state.projects.find(p => p.id === target.id);
                    const newName = prompt('구분선 이름을 변경하세요:', sep.name);
                    if (newName) {
                        sep.name = newName;
                        saveState();
                        renderProjects();
                    }
                }
                if (action === 'deleteSeparator') {
                    if (confirm('이 구분선을 삭제하시겠습니까?')) {
                        state.projects = state.projects.filter(p => p.id !== target.id);
                        saveState();
                        renderProjects();
                    }
                }
            }

            if (target.type === 'task') {
                if (action === 'toggleComplete') {
                    const project = getCurrentProject();
                    const task = project.tasks.find(t => t.id === target.id);
                    if (task) {
                        task.progress = task.progress === 100 ? 0 : 100;
                        saveState();
                        renderGantt();
                    }
                }
                if (action === 'edit') openTaskModal(target.id);
                if (action === 'duplicate') {
                    const project = getCurrentProject();
                    const task = project.tasks.find(t => t.id === target.id);
                    if (task) {
                        const newTask = { ...task, id: generateId(), name: `${task.name} (복사본)`, createdAt: new Date().toISOString() };
                        project.tasks.push(newTask);
                        saveState();
                        renderGantt();
                    }
                }
                if (action === 'delete') {
                    state.editingTaskId = target.id;
                    deleteTask();
                }
            } else if (target.type === 'project') {
                if (action === 'edit') openProjectModal(target.id);
                if (action === 'delete') deleteProjectById(target.id);
            }
            hideContextMenu();
        }

        // Tree Group Functions

        // Gantt Chart Rendering

            emptyState.style.display = 'none';

            const lowerQuery = (state.searchQuery || '').trim().toLowerCase();
            const { startDate, endDate, days } = calculateDateRange(project.tasks);
            const dayWidth = state.dayWidth * (state.zoom / 100);
 
            // Render Header
            let headerHtml = `
                <div class="gantt-header">

            // Render Body
            let bodyHtml = `
                <div class="gantt-body" id="ganttBody">

            visibleTasks.forEach(task => {
                const taskStart = new Date(task.startDate);

                const duration = Math.floor((taskEnd - taskStart) / (1000 * 60 * 60 * 24)) + 1;
                const left = startOffset * dayWidth;
                const width = duration * dayWidth - 4;

                bodyHtml += `
                    <div class="gantt-row"

                    bodyHtml += `<div class="gantt-cell-day ${isWeekend ? 'weekend' : ''}" style="width: ${dayWidth}px; min-width: ${dayWidth}px;"></div>`;
                });
 
                bodyHtml += `

            // Draw dependencies after render

        function drawDependencies() {
            const project = getCurrentProject();
            if (!project) return;

            const svg = document.getElementById('dependencySvg');
            const container = document.getElementById('ganttBody');
            if (!svg || !container) return;

            svg.innerHTML = '';

            const containerRect = container.getBoundingClientRect();

            // 화살표 마커 정의
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '8');
            marker.setAttribute('markerHeight', '6');
            marker.setAttribute('refX', '8');
            marker.setAttribute('refY', '3');
            marker.setAttribute('orient', 'auto');
            const arrowPath = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            arrowPath.setAttribute('points', '0 0, 8 3, 0 6');
            arrowPath.setAttribute('fill', '#e94560');
            marker.appendChild(arrowPath);
            defs.appendChild(marker);
            svg.appendChild(defs);

            project.tasks.forEach(task => {
                if (task.dependencies && task.dependencies.length > 0) {
                    const targetBar = document.getElementById(`task-bar-${task.id}`);
                    if (!targetBar) return;
                    const targetRect = targetBar.getBoundingClientRect();

                    const targetX = targetRect.left - containerRect.left;
                    const targetY = targetRect.top - containerRect.top + (targetRect.height / 2);

                    task.dependencies.forEach(depId => {
                        const sourceBar = document.getElementById(`task-bar-${depId}`);
                        if (!sourceBar) return;
                        const sourceRect = sourceBar.getBoundingClientRect();
                        const sourceX = sourceRect.right - containerRect.left;
                        const sourceY = sourceRect.top - containerRect.top + (sourceRect.height / 2);

                        // 베지어 곡선 연결선
                        const midX = sourceX + (targetX - sourceX) / 2;
                        const d = `M ${sourceX} ${sourceY} C ${midX} ${sourceY}, ${midX} ${targetY}, ${targetX} ${targetY}`;
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', d);
                        path.setAttribute('class', 'dependency-line');
                        path.setAttribute('marker-end', 'url(#arrowhead)');
                        svg.appendChild(path);

                        // 연결점 원 (소스 오른쪽)
                        const srcCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        srcCircle.setAttribute('cx', sourceX);
                        srcCircle.setAttribute('cy', sourceY);
                        srcCircle.setAttribute('r', '4');
                        srcCircle.setAttribute('fill', '#e94560');
                        svg.appendChild(srcCircle);

                        // 연결점 원 (타겟 왼쪽)
                        const tgtCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        tgtCircle.setAttribute('cx', targetX);
                        tgtCircle.setAttribute('cy', targetY);
                        tgtCircle.setAttribute('r', '4');
                        tgtCircle.setAttribute('fill', '#e94560');
                        svg.appendChild(tgtCircle);
                    });
                }
            });
        }

        function scrollToToday(containerId) {
            requestAnimationFrame(() => {
                setTimeout(() => {
                    const container = document.getElementById(containerId || 'ganttArea');
                    if (!container) return;
                    const todayEl = container.querySelector('.gantt-day.today') ||
                                    container.querySelector('[data-today="true"]');
                    if (!todayEl) return;
                    const containerRect = container.getBoundingClientRect();
                    const todayRect = todayEl.getBoundingClientRect();
                    const targetScroll = todayRect.left - containerRect.left + container.scrollLeft - (containerRect.width / 2) + (todayRect.width / 2);
                    container.scrollTo({ left: Math.max(0, targetScroll), behavior: 'smooth' });
                }, 50);
            });
        }

        // ========== 연결점 드래그로 선행 태스크 연결 ==========
        let depDragState = null;

        function startDepDrag(e, taskId, side) {
            e.preventDefault();
            e.stopPropagation();

            const bar = document.getElementById(`task-bar-${taskId}`);
            const container = document.getElementById('ganttBody');
            if (!bar || !container) return;

            const containerRect = container.getBoundingClientRect();
            const barRect = bar.getBoundingClientRect();

            const startX = side === 'right'
                ? barRect.right - containerRect.left
                : barRect.left - containerRect.left;
            const startY = barRect.top - containerRect.top + barRect.height / 2;

            // 드래그 중인 dot에 active 클래스
            const dot = bar.querySelector(`.dep-dot-${side}`);
            if (dot) dot.classList.add('active');

            depDragState = { taskId, side, startX, startY, containerRect, dot };

            // SVG에 임시 드래그 라인 추가
            const svg = document.getElementById('dependencySvg');
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('id', 'depDragLine');
            line.setAttribute('x1', startX);
            line.setAttribute('y1', startY);
            line.setAttribute('x2', startX);
            line.setAttribute('y2', startY);
            line.setAttribute('class', 'dep-drag-line');
            svg.appendChild(line);

            document.addEventListener('mousemove', onDepDragMove);
            document.addEventListener('mouseup', onDepDragEnd);
        }

        function onDepDragMove(e) {
            if (!depDragState) return;
            const line = document.getElementById('depDragLine');
            if (!line) return;

            const x = e.clientX - depDragState.containerRect.left;
            const y = e.clientY - depDragState.containerRect.top;
            line.setAttribute('x2', x);
            line.setAttribute('y2', y);

            // 호버 중인 dot 강조
            const el = document.elementFromPoint(e.clientX, e.clientY);
            document.querySelectorAll('.dep-dot.drop-target').forEach(d => d.classList.remove('drop-target'));
            if (el && el.classList.contains('dep-dot') && el.dataset.taskId !== depDragState.taskId) {
                el.classList.add('active');
            }
        }

        function onDepDragEnd(e) {
            document.removeEventListener('mousemove', onDepDragMove);
            document.removeEventListener('mouseup', onDepDragEnd);

            // 임시 라인 제거
            const line = document.getElementById('depDragLine');
            if (line) line.remove();

            if (depDragState && depDragState.dot) {
                depDragState.dot.classList.remove('active');
            }
            document.querySelectorAll('.dep-dot.active').forEach(d => d.classList.remove('active'));

            if (!depDragState) return;

            // 드롭 대상 찾기
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && el.classList.contains('dep-dot')) {
                const targetTaskId = el.dataset.taskId;
                const targetSide = el.dataset.side;

                if (targetTaskId && targetTaskId !== depDragState.taskId) {
                    // 연결 방향: 소스의 right -> 타겟의 left = 소스가 선행
                    // 소스의 left -> 타겟의 right = 타겟이 선행
                    let fromId, toId;
                    if (depDragState.side === 'right' && targetSide === 'left') {
                        fromId = depDragState.taskId; // 선행
                        toId = targetTaskId;           // 후행
                    } else if (depDragState.side === 'left' && targetSide === 'right') {
                        fromId = targetTaskId;         // 선행
                        toId = depDragState.taskId;    // 후행
                    } else {
                        // right->right 또는 left->left도 허용 (가까운 쪽 기준)
                        fromId = depDragState.taskId;
                        toId = targetTaskId;
                    }

                    const project = getCurrentProject();
                    if (project) {
                        const toTask = project.tasks.find(t => t.id === toId);
                        if (toTask) {
                            if (!toTask.dependencies) toTask.dependencies = [];
                            if (toTask.dependencies.includes(fromId)) {
                                // 이미 연결되어 있으면 해제
                                toTask.dependencies = toTask.dependencies.filter(d => d !== fromId);
                            } else {
                                // 순환 의존성 방지
                                if (!hasCyclicDep(project, fromId, toId)) {
                                    toTask.dependencies.push(fromId);
                                }
                            }
                            saveState();
                            renderGantt();
                        }
                    }
                }
            }

            depDragState = null;
        }

        function hasCyclicDep(project, fromId, toId) {
            // toId에 fromId를 추가했을 때 순환이 생기는지 확인
            const visited = new Set();
            function dfs(id) {
                if (id === toId) return true;
                if (visited.has(id)) return false;
                visited.add(id);
                const task = project.tasks.find(t => t.id === id);
                if (!task || !task.dependencies) return false;
                return task.dependencies.some(depId => dfs(depId));
            }
            return dfs(fromId);
        }

                            ${formatShortDate(day)}
                        </div>`;
                });

                html += `       </div></div>
                                <!-- Body -->
                                <div style="position: relative;">`;

                realProjects.forEach(p => {
                    if (p.tasks.length === 0) return;

                    html += `
                        <div style="display: flex; border-bottom: 1px solid #0f3460; height: 40px; position: relative;">
                            <div style="min-width: 150px; padding: 0 10px; border-right: 1px solid #0f3460; display: flex; align-items: center; font-size: 0.9rem; color: #eee; position: sticky; left: 0; background: #16213e; z-index: 2; cursor: pointer;" onclick="selectProject('${p.id}')">
                                <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(p.name)}</div>
                            </div>
                            <div style="display: flex; position: relative; flex: 1;">`;

                    days.forEach(day => {
                        const date = new Date(day);
                        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                        html += `<div style="width: ${dayWidth}px; min-width: ${dayWidth}px; border-right: 1px solid #0f3460; height: 100%; ${isWeekend ? 'background: rgba(233, 69, 96, 0.05);' : ''}"></div>`;
                    });

                    p.tasks.forEach(t => {
                        const s = new Date(t.startDate);
                        const e = new Date(t.endDate);
                        const startOffset = Math.floor((s - startDate) / (1000 * 60 * 60 * 24));
                        const duration = Math.floor((e - s) / (1000 * 60 * 60 * 24)) + 1;
                        const left = startOffset * dayWidth;
                        const width = duration * dayWidth - 4;

                        html += `

                            </div>`;
                    });

                    html += `
                            </div>
                        </div>`;
                });

                html += `       </div></div></div></div>`;
            }

            // 2. Statistics (전체 통계)
            html += `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">

                    </div>
                    <div style="background: #16213e; padding: 20px; border-radius: 12px; border: 1px solid #0f3460;">
                        <h3 style="color: #aaa; font-size: 0.9rem; margin-bottom: 5px;">전체 태스크</h3>

                        <div style="font-size: 2rem; font-weight: bold; color: ${globalProgress === 100 ? '#1dd1a1' : '#e94560'};">${globalProgress}%</div>
                    </div>
                </div>
            `;

            // 3. Imminent Tasks (마감 임박)
            const today = new Date();
            today.setHours(0,0,0,0);
            const urgentTasks = [];

            realProjects.forEach(p => {
                p.tasks.forEach(t => {
                    if (t.progress < 100) {
                        const end = new Date(t.endDate);
                        end.setHours(0,0,0,0);
                        const diffTime = end - today;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        
                        // Overdue or within 7 days
                        if (diffDays <= 7) {
                            urgentTasks.push({
                                projectId: p.id,
                                projectName: p.name,
                                task: t,
                                diffDays: diffDays
                            });
                        }
                    }
                });
            });

            urgentTasks.sort((a, b) => a.diffDays - b.diffDays);

            if (urgentTasks.length > 0) {
                html += `
                    <div style="margin-bottom: 30px;">
                        <h3 style="color: #fff; font-size: 1.1rem; margin-bottom: 15px;">🔥 마감 임박 / 지연된 태스크</h3>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;">
                `;
                
                urgentTasks.forEach(item => {
                    let dDayStr = '';
                    let dDayClass = '';
                    if (item.diffDays < 0) {
                        dDayStr = `D+${Math.abs(item.diffDays)}`;
                        dDayClass = 'color: #ff4757; font-weight: bold;';
                    } else if (item.diffDays === 0) {
                        dDayStr = 'D-Day';
                        dDayClass = 'color: #ff4757; font-weight: bold;';

                        dDayClass = 'color: #feca57; font-weight: bold;';

                    html += `
                        <div style="background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer;" onclick="selectProject('${item.projectId}')">

                            <div style="flex: 1; overflow: hidden;">

                html += `</div></div>`;

            // 4. All Tasks List (전체 태스크 목록)
            const allTasksFlat = realProjects.flatMap(p => p.tasks.map(t => ({...t, projectName: p.name, projectId: p.id})));
            // Sort by start date
            allTasksFlat.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

            html += `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="color: #fff; font-size: 1.1rem; margin: 0;">전체 태스크 목록</h3>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; color: #aaa;">
                        <input type="checkbox" ${state.filterCompleted ? 'checked' : ''} onchange="toggleDashboardFilter(this.checked)">

            `;
            html += `<div style="background: #16213e; border: 1px solid #0f3460; border-radius: 12px; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; color: #eee; font-size: 0.9rem;">

                        <tr style="background: #1a1a2e; border-bottom: 1px solid #0f3460;">

                            <th style="padding: 12px; text-align: center;">진행률</th>

                        </tr>
                    </thead>
                    <tbody>`;

            if (allTasksFlat.length === 0) {
                html += `<tr><td colspan="5" style="padding: 20px; text-align: center; color: #666;">등록된 태스크가 없습니다.</td></tr>`;
            } else {
                allTasksFlat.forEach(t => {
                    if (state.filterCompleted && t.progress === 100) return;

                    const isDone = t.progress === 100;
                    const isOverdue = !isDone && new Date(t.endDate) < new Date();
                    const status = isDone ? '<span style="color: #1dd1a1;">완료</span>' : 
                                   isOverdue ? '<span style="color: #ff4757;">D-day</span>' :

                    html += `
                        <tr style="border-bottom: 1px solid #0f3460; cursor: pointer;" onclick="navigateToTask('${t.projectId}', '${t.id}')" onmouseover="this.style.background='#1a1a2e'" onmouseout="this.style.background='transparent'">

                                <div style="display: flex; align-items: center; gap: 8px;">

            html += `</tbody></table></div>`;
            
            grid.innerHTML = html;
        }

        function toggleDashboardFilter(checked) {
            state.filterCompleted = checked;
            saveState();
            renderDashboard();
        }

        function calculateDateRange(tasks) {
            if (tasks.length === 0) {
                const today = new Date();
                return {
                    startDate: today,
                    endDate: new Date(today.getTime() + 30 * 24 * 60 * 60 * 1000),
                    days: generateDays(today, 30)
                };
            }
 
            let minDate = new Date(tasks[0].startDate);
            let maxDate = new Date(tasks[0].endDate);
 
            tasks.forEach(task => {
                const start = new Date(task.startDate);
                const end = new Date(task.endDate);
                if (start < minDate) minDate = start;
                if (end > maxDate) maxDate = end;
            });

            // Always include today in the range
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (today < minDate) minDate = new Date(today);
            if (today > maxDate) maxDate = new Date(today);

            // Add padding
            minDate.setDate(minDate.getDate() - 3);
            maxDate.setDate(maxDate.getDate() + 7);
 
            const days = generateDays(minDate, Math.ceil((maxDate - minDate) / (1000 * 60 * 60 * 24)));
 
            return { startDate: minDate, endDate: maxDate, days };
        }
 
        function generateDays(startDate, count) {
            const days = [];
            const current = new Date(startDate);
            for (let i = 0; i < count; i++) {
                days.push(current.toISOString().split('T')[0]);
                current.setDate(current.getDate() + 1);
            }
            return days;
        }

            }

        // Utility Functions
        function getCurrentProject() {
            return state.projects.find(p => p.id === state.currentProjectId);
        }
 
        function generateId() {

        }
 
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
 
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
 
        function formatShortDate(dateStr) {
            const date = new Date(dateStr);
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }
 
        function isSameDay(date1, date2) {
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }
 
        function setDefaultDates() {
            const today = new Date();
            const nextWeek = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
            document.getElementById('taskStartDate').value = today.toISOString().split('T')[0];
            document.getElementById('taskEndDate').value = nextWeek.toISOString().split('T')[0];
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('taskStartDate').value = dateStr;
            document.getElementById('taskEndDate').value = dateStr; // 1 Day duration
        }
 
        function renderColorOptions(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = COLORS.map(color => `
                <div class="color-option"
                     style="background: ${color}"
                     data-color="${color}"
                     onclick="selectColor('${color}', '${containerId}')"></div>
            `).join('');
        }
 
        function selectColor(color, containerId) {
            const container = document.getElementById(containerId);
            container.querySelectorAll('.color-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.color === color);
            });

        function updateProgressValue() {
