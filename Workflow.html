        }

        // Drag and Drop Logic
        let dragContext = null;

        function startDrag(e, taskId) {
            e.stopPropagation();
            const bar = e.currentTarget;
            const isResize = e.target.classList.contains('gantt-bar-handle');
            
            dragContext = {
                mode: isResize ? 'resize' : 'move',
                taskId: taskId,
                startX: e.clientX,
                startLeft: parseFloat(bar.style.left) || 0,
                startWidth: parseFloat(bar.style.width) || 0,
                bar: bar,
                dayWidth: state.dayWidth * (state.zoom / 100)
            };
            bar.style.cursor = isResize ? 'ew-resize' : 'grabbing';
            document.body.style.cursor = 'grabbing';
            
            document.addEventListener('mousemove', handleDragMove);
            document.addEventListener('mouseup', handleDragEnd);
        }

        function handleDragMove(e) {
            if (!dragContext) return;
            const dx = e.clientX - dragContext.startX;
            
            if (dragContext.mode === 'move') {
                dragContext.bar.style.left = (dragContext.startLeft + dx) + 'px';
            } else if (dragContext.mode === 'resize') {
                const newWidth = Math.max(dragContext.dayWidth - 4, dragContext.startWidth + dx);
                dragContext.bar.style.width = newWidth + 'px';
            }
        }

        function handleDragEnd(e) {
            if (!dragContext) return;
            
            const dx = e.clientX - dragContext.startX;
            const dayDiff = Math.round(dx / dragContext.dayWidth);
            
            if (dragContext.mode === 'move') {
                if (dayDiff !== 0) {
                    moveTask(dragContext.taskId, dayDiff);
                } else if (Math.abs(dx) < 5) {
                    openTaskModal(dragContext.taskId);
                } else {
                    renderGantt();
                }
            } else if (dragContext.mode === 'resize') {
                if (dayDiff !== 0) {
                    resizeTask(dragContext.taskId, dayDiff);
                } else {
                    renderGantt();
                }
            }

            dragContext.bar.style.cursor = '';
            document.body.style.cursor = '';
            document.removeEventListener('mousemove', handleDragMove);
            document.removeEventListener('mouseup', handleDragEnd);
            dragContext = null;
        }

        // Pan-scroll (grab to scroll)
        let panContext = null;

        document.addEventListener('mousedown', (e) => {
            const ganttArea = e.target.closest('.gantt-area');
            if (!ganttArea) return;
            // Don't pan if clicking on a task bar, task cell, or interactive element
            if (e.target.closest('.gantt-bar, .gantt-task-cell, .gantt-task-header, .dep-dot, button, input, select, a')) return;
            if (e.button !== 0) return;

            panContext = {
                el: ganttArea,
                startX: e.clientX,
                startY: e.clientY,
                scrollLeft: ganttArea.scrollLeft,
                scrollTop: ganttArea.scrollTop
            };
            ganttArea.classList.add('panning');
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!panContext) return;
            panContext.el.scrollLeft = panContext.scrollLeft - (e.clientX - panContext.startX);
            panContext.el.scrollTop = panContext.scrollTop - (e.clientY - panContext.startY);
        });

        document.addEventListener('mouseup', () => {
            if (!panContext) return;
            panContext.el.classList.remove('panning');
            panContext = null;
        });

        function moveTask(taskId, dayDiff) {
            const project = getCurrentProject();
            const task = project.tasks.find(t => t.id === taskId);
            if (task) {
                const start = new Date(task.startDate);
                const end = new Date(task.endDate);
                start.setDate(start.getDate() + dayDiff);
                end.setDate(end.getDate() + dayDiff);
                task.startDate = start.toISOString().split('T')[0];
                task.endDate = end.toISOString().split('T')[0];
                task.lastModified = new Date().toISOString();
                saveState();
                renderGantt();
            }
        }

        function resizeTask(taskId, dayDiff) {
            const project = getCurrentProject();
            const task = project.tasks.find(t => t.id === taskId);
            if (task) {
                const end = new Date(task.endDate);
                end.setDate(end.getDate() + dayDiff);

                const start = new Date(task.startDate);
                if (end < start) end.setTime(start.getTime());

                task.endDate = end.toISOString().split('T')[0];
                task.lastModified = new Date().toISOString();
                saveState();
                renderGantt();
            }
        }

        // HTML5 Drag and Drop (Structure & Reordering)
        let dragSourceItem = null;

        function handleDragStart(e, type, id) {
            dragSourceItem = { type, id };
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            // 드래그 앤 드롭이 작동하도록 데이터 설정 (필수)
            e.dataTransfer.setData('text/plain', id);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDragEndHTML5(e) {
            e.target.classList.remove('dragging');
            // Delay clearing dragSourceItem to ensure drop handlers can access it
            setTimeout(() => { dragSourceItem = null; }, 0);
        }

        // 그룹(separator)에 속한 프로젝트 인덱스 범위 반환
        function getGroupRange(sepIndex) {
            const start = sepIndex;
            let end = sepIndex; // separator 자신 포함
            for (let i = sepIndex + 1; i < state.projects.length; i++) {
                if (state.projects[i].type === 'separator') break;
                end = i;
            }
            return { start, end, count: end - start + 1 };
        }

        function handleSidebarDrop(e, targetId) {
            e.preventDefault();
            e.stopPropagation();
            const source = dragSourceItem;
            if (!source) return;

            // Allow reordering projects and separators
            if (source.type === 'project') {
                const sourceIndex = state.projects.findIndex(p => p.id === source.id);
                const targetIndex = state.projects.findIndex(p => p.id === targetId);

                if (sourceIndex !== -1 && targetIndex !== -1 && sourceIndex !== targetIndex) {
                    const [moved] = state.projects.splice(sourceIndex, 1);
                    state.projects.splice(targetIndex, 0, moved);
                    saveState();
                    renderProjects();
                }
            } else if (source.type === 'separator') {
                const sourceIndex = state.projects.findIndex(p => p.id === source.id);
                const targetIndex = state.projects.findIndex(p => p.id === targetId);
                if (sourceIndex === -1 || targetIndex === -1) return;

                // 드래그 대상이 자기 그룹 내부이면 무시
                const range = getGroupRange(sourceIndex);
                if (targetIndex >= range.start && targetIndex <= range.end) return;

                // 그룹 전체(separator + 하위 프로젝트)를 추출
                const groupItems = state.projects.splice(range.start, range.count);

                // splice 후 targetIndex 재계산
                let newTargetIndex = state.projects.findIndex(p => p.id === targetId);
                if (newTargetIndex === -1) {
                    // target이 그룹 내부였을 수 있음 (이미 위에서 걸러짐)
                    state.projects.splice(range.start, 0, ...groupItems);
                    return;
                }

                // target이 separator면 그 앞에, 프로젝트면 그 뒤에 삽입
                const targetItem = state.projects[newTargetIndex];
                if (targetItem && targetItem.type === 'separator') {
                    state.projects.splice(newTargetIndex, 0, ...groupItems);
                } else {
                    state.projects.splice(newTargetIndex + 1, 0, ...groupItems);
                }

                saveState();
                renderProjects();
            } else if (source.type === 'task') {
                if (state.currentProjectId === targetId) return;
                const sourceProject = getCurrentProject();
                const targetProject = state.projects.find(p => p.id === targetId);
                const taskIndex = sourceProject.tasks.findIndex(t => t.id === source.id);
                if (taskIndex !== -1 && targetProject) {
                    const [movedTask] = sourceProject.tasks.splice(taskIndex, 1);
                    targetProject.tasks.push(movedTask);
                    saveState();
                    renderProjects();
                    renderGantt();
                }
            }
        }

        function handleTrashDrop(e) {
            e.preventDefault();
            const source = dragSourceItem;
            if (!source || source.type !== 'project') return;
            
            // deleteProjectById already includes a confirm dialog
            deleteProjectById(source.id);
            e.target.classList.remove('dragging');
        }

        function handleTaskDrop(e, targetId) {
            e.preventDefault();
            const source = dragSourceItem;
            if (!source || source.type !== 'task') return;

            const project = getCurrentProject();
            const sourceIndex = project.tasks.findIndex(t => t.id === source.id);
            const targetIndex = project.tasks.findIndex(t => t.id === targetId);

            if (sourceIndex !== -1 && targetIndex !== -1 && sourceIndex !== targetIndex) {
                const [moved] = project.tasks.splice(sourceIndex, 1);
                project.tasks.splice(targetIndex, 0, moved);
                saveState();
                renderGantt();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeProjectModal();
                closeTaskModal();
                closeMemoModal();
            }
        });

        // ========== Electron 연동 (알람 & 항상 위에 표시) ==========
        let alarmCheckInterval = null;
        let notifiedTasks = new Set(); // 이미 알림 보낸 태스크 추적 (하루 1회)

        function initElectronFeatures() {
            if (typeof window.electronAPI === 'undefined') return;

            // 항상 위에 표시 버튼 활성화
            const btn = document.getElementById('alwaysOnTopBtn');
            if (btn) btn.style.display = 'block';

            // 현재 상태 반영
            window.electronAPI.getAlwaysOnTop().then(val => {
                updateAlwaysOnTopUI(val);
            });

            // 상태 변경 이벤트 수신
            window.electronAPI.onAlwaysOnTopChanged((val) => {
                updateAlwaysOnTopUI(val);
            });

            // 알람 체크 시작 (매 5분마다)
            checkAlarms();
            alarmCheckInterval = setInterval(checkAlarms, 5 * 60 * 1000);
        }

        function toggleAlwaysOnTop() {
            if (typeof window.electronAPI !== 'undefined') {
                window.electronAPI.toggleAlwaysOnTop();
            }
        }

        function updateAlwaysOnTopUI(isOnTop) {
            const btn = document.getElementById('alwaysOnTopBtn');
            if (!btn) return;
            if (isOnTop) {
                btn.textContent = '📌 항상 위 (켜짐)';
                btn.style.background = '#e94560';
                btn.style.color = '#fff';
            } else {
                btn.textContent = '📌 항상 위에 표시';
                btn.style.background = '#0f3460';
                btn.style.color = '#aaa';
            }
        }

        function checkAlarms() {
            if (typeof window.electronAPI === 'undefined') return;

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayKey = today.toISOString().split('T')[0];

            // 하루가 바뀌면 알림 기록 초기화
            if (window._lastAlarmDate !== todayKey) {
                notifiedTasks.clear();
                window._lastAlarmDate = todayKey;
            }

            const realProjects = state.projects.filter(p => p.type !== 'separator');

            // 알림을 카테고리별로 모아서 한번에 전송
            const overdue = [];   // 마감 초과
            const dueToday = [];  // 오늘 마감
            const dueSoon = [];   // 1~3일 내 마감

            realProjects.forEach(project => {
                if (!project.tasks) return;
                project.tasks.forEach(task => {
                    if (task.progress === 100) return;

                    const taskKey = `${task.id}_${todayKey}`;
                    if (notifiedTasks.has(taskKey)) return;

                    const endDate = new Date(task.endDate);
                    endDate.setHours(0, 0, 0, 0);
                    const diffDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));

                    const label = `[${project.name}] ${task.name}`;

                    if (diffDays < 0) {
                        overdue.push(`${label} (${Math.abs(diffDays)}일 초과)`);
                        notifiedTasks.add(taskKey);
                    } else if (diffDays === 0) {
                        dueToday.push(label);
                        notifiedTasks.add(taskKey);
                    } else if (diffDays <= 3) {
                        dueSoon.push(`${label} (D-${diffDays})`);
                        notifiedTasks.add(taskKey);
                    }
                });
            });

            // 모든 항목을 하나의 알림으로 통합
            const lines = [];
            if (overdue.length) lines.push(`⚠️ 마감 초과 (${overdue.length}건): ${overdue.join(', ')}`);
            if (dueToday.length) lines.push(`🔥 오늘 마감 (${dueToday.length}건): ${dueToday.join(', ')}`);
            if (dueSoon.length) lines.push(`📋 마감 임박 (${dueSoon.length}건): ${dueSoon.join(', ')}`);

            if (lines.length > 0) {
                const total = overdue.length + dueToday.length + dueSoon.length;
                window.electronAPI.showNotification(
                    `Daywalker - ${total}건의 마감 알림`,
                    lines.join('\n')
                );
            }
        }

        // ========== Split Handle ==========
        (function initSplitHandle() {
            const handle = document.getElementById('splitHandle');
            const ganttArea = document.getElementById('ganttArea');
            const split = document.getElementById('ganttSplit');
            const slot = document.getElementById('stickerBoardSlot');
            let dragging = false;

            handle.addEventListener('mousedown', (e) => {
                e.preventDefault();
                dragging = true;
                handle.classList.add('dragging');
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const splitRect = split.getBoundingClientRect();
                const totalH = splitRect.height - 8; // 8 = handle height
                const offset = e.clientY - splitRect.top;
                const minH = 100;
                const ganttH = Math.max(minH, Math.min(offset, totalH - minH));
                const stickerH = totalH - ganttH;
                // Switch from flex to explicit px
                ganttArea.style.flex = 'none';
                ganttArea.style.height = ganttH + 'px';
                const board = slot.firstElementChild;
                if (board) {
                    board.style.flex = 'none';
                    board.style.height = stickerH + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                handle.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            });
        })();

        // ========== Sticker Board ==========
        const STICKER_STATUS_COLORS = {
            // LP
            contacted: '#6b7280', interested: '#3b82f6', negotiating: '#f59e0b',
            committed: '#10b981', paid: '#8b5cf6', dropped: '#ef4444',
            // Deal process
            sourcing: '#06b6d4', reviewing: '#3b82f6', dd: '#f59e0b',
            negotiation: '#f97316', signing: '#10b981', closed: '#8b5cf6', passed: '#ef4444',
            // General
            todo: '#6b7280', in_progress: '#3b82f6', done: '#10b981'
        };

        const STICKER_STATUS_LABELS = {
            // LP
            contacted: '컨택', interested: '관심', negotiating: '협상',
            committed: '확약', paid: '납입', dropped: '드랍',
            // Deal process
            sourcing: '소싱', reviewing: '검토 중', dd: '실사(DD)',
            negotiation: '협상', signing: '계약 체결', closed: '클로징', passed: '패스',
            // General
            todo: '할 일', in_progress: '진행 중', done: '완료'
        };

        const STICKER_CATEGORY_LABELS = { lp: 'LP', deal: '딜', note: '메모' };
        const STICKER_CATEGORY_ICONS = { lp: '👥', deal: '💼', note: '📌' };

        function renderStickerBoard() {
            const project = getCurrentProject();
            if (!project) return '';

            const stickers = project.stickers || [];

            let html = `
                <div class="sticker-board" id="stickerBoard">
                    <div class="sticker-board-header">
                        <h4>스티커 보드</h4>
                        <button onclick="openStickerModal()">+ 스티커 추가</button>
                    </div>
                    <div class="sticker-board-content" id="stickerBoardContent"
                         oncontextmenu="event.preventDefault()">
            `;

            if (stickers.length === 0) {
                html += '<div class="sticker-board-empty">스티커를 추가하여 LP, 딜, 메모를 관리하세요</div>';
            } else {
                stickers.forEach(s => {
                    const color = STICKER_STATUS_COLORS[s.status] || '#6b7280';
                    const label = STICKER_STATUS_LABELS[s.status] || s.status;
                    const catIcon = STICKER_CATEGORY_ICONS[s.category] || '📌';
                    const title = s.title || s.lpName || ''; // backward compat with lpName
                    html += `
                        <div class="sticker" id="sticker-${s.id}"
                             style="left: ${s.x || 10}px; top: ${s.y || 10}px;"
                             onmousedown="startStickerDrag(event, '${s.id}')"
                             ondblclick="openStickerModal('${s.id}')"
                             oncontextmenu="event.preventDefault(); event.stopPropagation(); deleteStickerConfirm('${s.id}');">
                            <div class="sticker-color-bar" style="background: ${color};"></div>
                            <div class="sticker-body">
                                <div class="sticker-title">${catIcon} ${escapeHtml(title)}</div>
                                <div class="sticker-status" style="background: ${color}22; color: ${color};">${label}</div>
                                <div class="sticker-info">
                                    ${s.amount ? `<span>💰 ${s.amount}억</span>` : ''}
                                    ${s.assignee ? `<span>👤 ${escapeHtml(s.assignee)}</span>` : ''}
                                </div>
                                ${s.memo ? `<div class="sticker-memo">${escapeHtml(s.memo)}</div>` : ''}
                            </div>
                        </div>
                    `;
                });
            }

            html += '</div></div>';
            return html;
        }

        // Sticker drag
        let _stickerDrag = null;

        function startStickerDrag(e, stickerId) {
            if (e.button !== 0) return; // left click only
            e.preventDefault();
            const el = document.getElementById(`sticker-${stickerId}`);
            if (!el) return;
            const board = document.getElementById('stickerBoardContent');
            if (!board) return;

            const boardRect = board.getBoundingClientRect();
            const startX = e.clientX;
            const startY = e.clientY;
            const origLeft = parseInt(el.style.left) || 0;
            const origTop = parseInt(el.style.top) || 0;

            el.classList.add('dragging-sticker');

            _stickerDrag = { stickerId, el, board, boardRect, startX, startY, origLeft, origTop };

            document.addEventListener('mousemove', onStickerDragMove);
            document.addEventListener('mouseup', onStickerDragEnd);
        }

        function onStickerDragMove(e) {
            if (!_stickerDrag) return;
            const { el, boardRect, startX, startY, origLeft, origTop } = _stickerDrag;
            let newLeft = origLeft + (e.clientX - startX);
            let newTop = origTop + (e.clientY - startY);

            // Clamp to board bounds
            newLeft = Math.max(0, Math.min(newLeft, boardRect.width - 190));
            newTop = Math.max(0, Math.min(newTop, Math.max(boardRect.height - 140, 0)));

            el.style.left = newLeft + 'px';
            el.style.top = newTop + 'px';
        }

        function onStickerDragEnd(e) {
            if (!_stickerDrag) return;
            const { stickerId, el } = _stickerDrag;
            el.classList.remove('dragging-sticker');

            // Save position
            const project = getCurrentProject();
            if (project && project.stickers) {
                const sticker = project.stickers.find(s => s.id === stickerId);
                if (sticker) {
                    sticker.x = parseInt(el.style.left) || 0;
                    sticker.y = parseInt(el.style.top) || 0;
                    sticker.updatedAt = new Date().toISOString();
                    saveState();
                }
            }

            _stickerDrag = null;
            document.removeEventListener('mousemove', onStickerDragMove);
            document.removeEventListener('mouseup', onStickerDragEnd);
        }

        // Sticker modal
        function openStickerModal(stickerId) {
            const modal = document.getElementById('stickerModal');
            const titleEl = document.getElementById('stickerModalTitle');
            const deleteBtn = document.getElementById('deleteStickerBtn');

            if (stickerId) {
                const project = getCurrentProject();
                const sticker = (project.stickers || []).find(s => s.id === stickerId);
                if (!sticker) return;

                titleEl.textContent = '스티커 수정';
                document.getElementById('stickerTitle').value = sticker.title || sticker.lpName || '';
                document.getElementById('stickerCategory').value = sticker.category || 'lp';
                document.getElementById('stickerStatus').value = sticker.status || 'contacted';
                document.getElementById('stickerAmount').value = sticker.amount || '';
                document.getElementById('stickerAssignee').value = sticker.assignee || '';
                document.getElementById('stickerMemo').value = sticker.memo || '';
                deleteBtn.style.display = 'block';
                state.editingStickerId = stickerId;
            } else {
                titleEl.textContent = '새 스티커';
                document.getElementById('stickerTitle').value = '';
                document.getElementById('stickerCategory').value = 'lp';
                document.getElementById('stickerStatus').value = 'contacted';
                document.getElementById('stickerAmount').value = '';
                document.getElementById('stickerAssignee').value = '';
                document.getElementById('stickerMemo').value = '';
                deleteBtn.style.display = 'none';
                state.editingStickerId = null;
            }

            modal.classList.remove('hidden');
            document.getElementById('stickerTitle').focus();
        }

        function closeStickerModal() {
            document.getElementById('stickerModal').classList.add('hidden');
            state.editingStickerId = null;
        }

        function saveSticker() {
            const title = document.getElementById('stickerTitle').value.trim();
            if (!title) {
                alert('제목을 입력하세요');
                return;
            }

            const project = getCurrentProject();
            if (!project.stickers) project.stickers = [];

            const data = {
                title,
                category: document.getElementById('stickerCategory').value,
                status: document.getElementById('stickerStatus').value,
                amount: parseInt(document.getElementById('stickerAmount').value) || 0,
                assignee: document.getElementById('stickerAssignee').value.trim(),
                memo: document.getElementById('stickerMemo').value.trim(),
                updatedAt: new Date().toISOString()
            };

            if (state.editingStickerId) {
                const sticker = project.stickers.find(s => s.id === state.editingStickerId);
                if (sticker) {
                    Object.assign(sticker, data);
                }
            } else {
                // Place new sticker with slight random offset to avoid stacking
                const offsetX = 10 + (project.stickers.length % 5) * 190;
                const offsetY = 10 + Math.floor(project.stickers.length / 5) * 145;
                project.stickers.push({
                    id: generateId(),
                    ...data,
                    x: offsetX,
                    y: offsetY,
                    createdAt: new Date().toISOString()
                });
            }

            saveState();
            renderGantt();
            closeStickerModal();
        }

        function deleteSticker() {
            if (!state.editingStickerId) return;
            if (!confirm('이 스티커를 삭제하시겠습니까?')) return;

            const project = getCurrentProject();
            if (project && project.stickers) {
                project.stickers = project.stickers.filter(s => s.id !== state.editingStickerId);
                saveState();
                renderGantt();
            }
            closeStickerModal();
        }

        function deleteStickerConfirm(stickerId) {
            if (!confirm('이 스티커를 삭제하시겠습니까?')) return;
            const project = getCurrentProject();
            if (project && project.stickers) {
                project.stickers = project.stickers.filter(s => s.id !== stickerId);
                saveState();
                renderGantt();
            }
        }

        // ========== Google Calendar 동기화 ==========
        let _gcalSyncInterval = null;

        async function initGoogleCalSync() {
            if (typeof window.electronAPI !== 'undefined') return;
            const btn = document.getElementById('googleCalBtn');
            if (!btn) return;
            btn.style.display = 'block';

            try {
                const res = await fetch('/api/auth/status');
                const { connected } = await res.json();
                if (connected) {
                    btn.textContent = '📅 Google Calendar 연결됨';
                    btn.style.background = '#2d8659';
                    btn.onclick = disconnectGoogleCalendar;
                    startGcalSync();
                } else {
                    btn.textContent = '📅 Google Calendar 연결';
                    btn.style.background = '#4285f4';
                    btn.onclick = connectGoogleCalendar;
                }
            } catch (e) { /* server not available */ }
        }

        function connectGoogleCalendar() {
            window.open('/api/auth/google', '_blank', 'width=500,height=600');
            setTimeout(() => initGoogleCalSync(), 5000);
        }

        async function disconnectGoogleCalendar() {
            if (!confirm('Google Calendar 연결을 해제하시겠습니까?')) return;
            await fetch('/api/auth/disconnect', { method: 'POST' });
            stopGcalSync();
            initGoogleCalSync();
        }

        function startGcalSync() {
            if (_gcalSyncInterval) return;
            doGcalSync();
            _gcalSyncInterval = setInterval(doGcalSync, 5 * 60 * 1000);
        }

        function stopGcalSync() {
            if (_gcalSyncInterval) clearInterval(_gcalSyncInterval);
            _gcalSyncInterval = null;
        }

        async function doGcalSync() {
            try {
                const res = await fetch('/api/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: state.projects })
                });
                if (!res.ok) return;
                const { changes } = await res.json();
                let changed = false;

                (changes.updated || []).forEach(u => {
                    state.projects.forEach(p => {
                        if (p.type === 'separator') return;
                        const task = (p.tasks || []).find(t => t.id === u.taskId);
                        if (task) {
                            task.startDate = u.startDate;
                            task.endDate = u.endDate;
                            if (u.taskName) task.name = u.taskName;
                            if (u.progress !== undefined) task.progress = u.progress;
                            task.lastModified = new Date().toISOString();
                            changed = true;
                        }
                    });
                });

                if (changed) {
                    renderProjects();
                    renderGantt();
                    saveState();
                }
                console.log('Google Calendar sync complete:', changes);
            } catch (e) {
                console.error('Google Calendar sync error:', e);
            }
        }

        // 페이지 로드 시 Electron 기능 초기화
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(initElectronFeatures, 500);
            setTimeout(initGoogleCalSync, 1000);
        });
    </script>
</body>
